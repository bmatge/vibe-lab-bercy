{% extends "base.html" %}

{% block title %}{{ title }} — Vibe Lab{% endblock %}

{% block content %}
  <div class="fr-mb-3w" style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
    <a href="/documents" class="fr-btn fr-btn--tertiary fr-btn--icon-left fr-icon-arrow-left-line fr-btn--sm">Retour aux documents</a>
    <a href="/docs/export/{{ slug }}.docx" class="fr-btn fr-btn--secondary fr-btn--icon-left fr-icon-download-line fr-btn--sm" download>Télécharger en DOCX</a>
  </div>

  <div class="fr-grid-row fr-grid-row--gutters">
    <!-- Menu latéral sticky -->
    <div class="fr-col-12 fr-col-md-4 fr-col-lg-3">
      <nav class="fr-sidemenu vl-doc-sidemenu" aria-labelledby="fr-sidemenu-title">
        <div class="fr-sidemenu__body">
          <div class="fr-sidemenu__inner">
            <button class="fr-sidemenu__btn" aria-controls="fr-sidemenu-wrapper" aria-expanded="false">
              Sommaire
            </button>
            <div class="fr-collapse" id="fr-sidemenu-wrapper">
              <div class="fr-sidemenu__title" id="fr-sidemenu-title">{{ title }}</div>
              {{ toc_html | safe }}
            </div>
          </div>
        </div>
      </nav>
    </div>

    <!-- Contenu du document -->
    <div class="fr-col-12 fr-col-md-8 fr-col-lg-9">
      <div class="vl-doc-content">
        {{ content_html | safe }}
      </div>
    </div>
  </div>
{% endblock %}

{% block page_scripts %}
<script>
(function() {
  var nav = document.querySelector('.vl-doc-sidemenu');
  if (!nav) return;
  var tocUl = nav.querySelector('.toc > ul') || nav.querySelector('.fr-collapse > ul');
  if (!tocUl) return;

  // 1. Convert markdown TOC into styled sidemenu with collapsible sub-lists
  function convertList(ul, depth) {
    ul.classList.add('vl-toc__list');
    ul.setAttribute('data-depth', depth);
    // Sub-lists start collapsed
    if (depth > 0) ul.classList.add('vl-toc__list--collapsed');

    var items = ul.querySelectorAll(':scope > li');
    items.forEach(function(li) {
      li.classList.add('vl-toc__item');
      li.setAttribute('data-depth', depth);
      var a = li.querySelector(':scope > a');
      if (a) {
        a.classList.add('vl-toc__link');
        a.setAttribute('target', '_self');
      }
      var subUl = li.querySelector(':scope > ul');
      if (subUl) {
        li.classList.add('vl-toc__item--parent');
        // Add chevron toggle
        var toggle = document.createElement('button');
        toggle.className = 'vl-toc__toggle';
        toggle.setAttribute('aria-expanded', 'false');
        toggle.setAttribute('aria-label', 'Déplier la section');
        toggle.innerHTML = '<span class="vl-toc__chevron"></span>';
        toggle.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var expanded = toggle.getAttribute('aria-expanded') === 'true';
          toggle.setAttribute('aria-expanded', expanded ? 'false' : 'true');
          subUl.classList.toggle('vl-toc__list--collapsed', expanded);
        });
        li.insertBefore(toggle, a);
        convertList(subUl, depth + 1);
      }
    });
  }
  convertList(tocUl, 0);

  // 2. Scroll spy with auto-disclosure and active indicator
  var allLinks = nav.querySelectorAll('a.vl-toc__link');
  var sections = [];
  allLinks.forEach(function(a) {
    var id = a.getAttribute('href');
    if (id && id.startsWith('#')) {
      var el = document.getElementById(id.substring(1));
      if (el) sections.push({ el: el, link: a, li: a.closest('.vl-toc__item') });
    }
  });

  var prevActive = null;

  function expandParents(li) {
    var parent = li.parentElement;
    while (parent && parent !== nav) {
      if (parent.classList.contains('vl-toc__list') && parent.getAttribute('data-depth') > 0) {
        parent.classList.remove('vl-toc__list--collapsed');
        var toggle = parent.previousElementSibling;
        if (!toggle || !toggle.classList.contains('vl-toc__toggle')) {
          toggle = parent.parentElement.querySelector(':scope > .vl-toc__toggle');
        }
        if (toggle && toggle.classList.contains('vl-toc__toggle')) {
          toggle.setAttribute('aria-expanded', 'true');
        }
      }
      parent = parent.parentElement;
    }
  }

  function collapseAll() {
    nav.querySelectorAll('.vl-toc__list[data-depth]:not([data-depth="0"])').forEach(function(ul) {
      ul.classList.add('vl-toc__list--collapsed');
    });
    nav.querySelectorAll('.vl-toc__toggle').forEach(function(btn) {
      btn.setAttribute('aria-expanded', 'false');
    });
  }

  function onScroll() {
    var scrollY = window.scrollY + 140;
    var current = null;
    for (var i = 0; i < sections.length; i++) {
      if (sections[i].el.offsetTop <= scrollY) current = sections[i];
    }
    if (current === prevActive) return;
    prevActive = current;

    // Remove all active states
    allLinks.forEach(function(a) { a.classList.remove('vl-toc__link--active'); });

    if (!current) return;

    // Set active
    current.link.classList.add('vl-toc__link--active');

    // Auto-disclose: collapse all, then expand ancestors of active
    collapseAll();
    expandParents(current.li);

    // Also expand direct children if active item is a parent
    var directSub = current.li.querySelector(':scope > .vl-toc__list');
    if (directSub) {
      directSub.classList.remove('vl-toc__list--collapsed');
      var toggle = current.li.querySelector(':scope > .vl-toc__toggle');
      if (toggle) toggle.setAttribute('aria-expanded', 'true');
    }

    // Auto-scroll sidemenu to keep active visible
    var navRect = nav.getBoundingClientRect();
    var linkRect = current.link.getBoundingClientRect();
    if (linkRect.top < navRect.top || linkRect.bottom > navRect.bottom) {
      current.link.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
  }

  if (sections.length) {
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }
})();
</script>
{% endblock %}
