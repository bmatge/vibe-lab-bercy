{% extends "base.html" %}

{% block title %}{{ title }} — Vibe Lab{% endblock %}

{% block content %}
  <div class="fr-mb-3w" style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
    <a href="/documents" class="fr-btn fr-btn--tertiary fr-btn--icon-left fr-icon-arrow-left-line fr-btn--sm">Retour aux documents</a>
    <a href="/docs/export/{{ slug }}.docx" class="fr-btn fr-btn--secondary fr-btn--icon-left fr-icon-download-line fr-btn--sm" download>Télécharger en DOCX</a>
  </div>

  <div class="fr-grid-row fr-grid-row--gutters">
    <!-- Menu latéral sticky -->
    <div class="fr-col-12 fr-col-md-4 fr-col-lg-3">
      <nav class="fr-sidemenu vl-doc-sidemenu" aria-labelledby="fr-sidemenu-title">
        <div class="fr-sidemenu__body">
          <div class="fr-sidemenu__inner">
            <button class="fr-sidemenu__btn" aria-controls="fr-sidemenu-wrapper" aria-expanded="false">
              Sommaire
            </button>
            <div class="fr-collapse" id="fr-sidemenu-wrapper">
              <div class="fr-sidemenu__title" id="fr-sidemenu-title">{{ title }}</div>
              {{ toc_html | safe }}
            </div>
          </div>
        </div>
      </nav>
    </div>

    <!-- Contenu du document -->
    <div class="fr-col-12 fr-col-md-8 fr-col-lg-9">
      <div class="vl-doc-content">
        {{ content_html | safe }}
      </div>
    </div>
  </div>
{% endblock %}

{% block page_scripts %}
<script>
(function() {
  // Transform the TOC <ul> generated by markdown into DSFR sidemenu markup
  var nav = document.querySelector('.vl-doc-sidemenu');
  if (!nav) return;
  var tocUl = nav.querySelector('.fr-collapse > ul');
  if (!tocUl) return;

  function convertList(ul) {
    ul.classList.add('fr-sidemenu__list');
    var items = ul.querySelectorAll(':scope > li');
    items.forEach(function(li) {
      li.classList.add('fr-sidemenu__item');
      var a = li.querySelector(':scope > a');
      if (a) {
        a.classList.add('fr-sidemenu__link');
        a.setAttribute('target', '_self');
      }
      var subUl = li.querySelector(':scope > ul');
      if (subUl) convertList(subUl);
    });
  }
  convertList(tocUl);

  // Highlight active section on scroll
  var links = nav.querySelectorAll('a.fr-sidemenu__link');
  var sections = [];
  links.forEach(function(a) {
    var id = a.getAttribute('href');
    if (id && id.startsWith('#')) {
      var el = document.getElementById(id.substring(1));
      if (el) sections.push({ el: el, link: a });
    }
  });

  function onScroll() {
    var scrollY = window.scrollY + 120;
    var current = null;
    for (var i = 0; i < sections.length; i++) {
      if (sections[i].el.offsetTop <= scrollY) current = sections[i];
    }
    links.forEach(function(a) { a.removeAttribute('aria-current'); });
    if (current) current.link.setAttribute('aria-current', 'page');
  }
  if (sections.length) {
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  }
})();
</script>
{% endblock %}
